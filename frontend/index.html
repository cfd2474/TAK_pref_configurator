<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TAK-CIV Preference Configurator</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <h1>TAK-CIV Preference Configurator</h1>
      <p class="subtitle">Build TAK-CIV <code>.pref</code> configuration files for deployment</p>
    </div>
    <div class="header-actions">
      <label class="btn btn-secondary import-btn">
        Import .pref
        <input type="file" id="import-file" accept=".pref,.xml" hidden>
      </label>
      <button type="button" id="preview-btn" class="btn btn-secondary">Preview XML</button>
      <button type="button" id="download-btn" class="btn btn-primary">Download .pref</button>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-search">
        <input type="search" id="category-search" placeholder="Search settings…" autocomplete="off">
      </div>
      <nav id="category-nav" class="category-nav"></nav>
      <div class="sidebar-footer">
        <label for="filename">Output filename</label>
        <input type="text" id="filename" value="tak-civ-config.pref">
        <p class="hint">Preference group: <code>com.atakmap.civ_preferences</code></p>
      </div>
    </aside>

    <main class="content">
      <div id="panel-title" class="panel-title"></div>
      <div id="panel-description" class="panel-description"></div>
      <form id="settings-form" class="settings-form" autocomplete="off"></form>
    </main>
  </div>

  <dialog id="preview-dialog">
    <div class="dialog-header">
      <h2>Generated TAK-CIV .pref Preview</h2>
      <button type="button" id="close-preview" class="icon-btn" aria-label="Close">&times;</button>
    </div>
    <pre id="preview-content"></pre>
  </dialog>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="/js/app.js"></script>
</body>
</html>
